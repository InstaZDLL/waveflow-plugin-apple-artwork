# Single job (no OS matrix — one portable plugin.wasm). On a v* tag:
# build the component, package manifest.toml + plugin.wasm into
# apple-artwork-v<version>.zip, compute the blake3, attach both to the
# GitHub Release. Then PR the version + blake3 into InstaZDLL/waveflow-plugins.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PLUGIN_ID: apple-artwork

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-wasip1

      - name: Install cargo-component + b3sum
        run: |
          cargo install cargo-component --locked
          cargo install b3sum --locked

      - name: Build component
        run: cargo component build --release

      - name: Assemble dist/
        id: assemble
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          WASM=$(find target -name '*.wasm' -path '*release*' | head -n1)
          test -n "$WASM" || { echo "::error::no release .wasm found"; exit 1; }

          mkdir -p dist
          cp manifest.toml dist/
          cp "$WASM" dist/plugin.wasm

          BLAKE3=$(b3sum --no-names dist/plugin.wasm)
          echo "$BLAKE3" > dist/plugin.wasm.blake3
          echo "blake3=$BLAKE3" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          ZIP="${PLUGIN_ID}-v${VERSION}.zip"
          ( cd dist && zip -r "../$ZIP" manifest.toml plugin.wasm )
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "::notice title=blake3::plugin.wasm blake3 = $BLAKE3  (paste into registry.json)"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.assemble.outputs.zip }}
            dist/plugin.wasm.blake3
          body: |
            WaveFlow plugin `apple-artwork` v${{ steps.assemble.outputs.version }}

            `plugin.wasm` blake3:
            ```
            ${{ steps.assemble.outputs.blake3 }}
            ```
            List/update in the store: PR against
            [InstaZDLL/waveflow-plugins](https://github.com/InstaZDLL/waveflow-plugins)
            with `version` = `${{ steps.assemble.outputs.version }}` and `blake3` above.
